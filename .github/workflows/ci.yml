name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: PHP syntax (8.0–8.3)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Lint all PHP files
        run: find arcadia-agents -name "*.php" -not -path "*/vendor/*" -print0 | xargs -0 -n1 -P4 php -l

  static-analysis:
    name: wp_slash gate + PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Composer dependencies (with dev)
        run: cd arcadia-agents && composer install --prefer-dist --no-progress

      # Keystone anti-regression: no WordPress write may ship without wp_slash().
      - name: wp_slash safety gate
        run: cd arcadia-agents && php bin/check-wp-slash.php

      - name: PHPStan
        run: cd arcadia-agents && vendor/bin/phpstan analyse --no-progress --memory-limit=2G

  coding-standards:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, cs2pr

      - name: Install PHPCS and WordPress standards
        run: |
          composer global require --no-progress squizlabs/php_codesniffer
          composer global require --no-progress wp-coding-standards/wpcs
          composer global require --no-progress phpcompatibility/phpcompatibility-wp
          ~/.composer/vendor/bin/phpcs --config-set installed_paths ~/.composer/vendor/wp-coding-standards/wpcs,~/.composer/vendor/phpcompatibility/phpcompatibility-wp,~/.composer/vendor/phpcompatibility/php-compatibility

      - name: Run PHPCS
        run: cd arcadia-agents && ~/.composer/vendor/bin/phpcs --standard=phpcs.xml --report=checkstyle | cs2pr
        continue-on-error: true

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    needs: [syntax, static-analysis]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Composer dependencies (with dev)
        run: cd arcadia-agents && composer install --prefer-dist --no-progress

      # Unit tests use hand-mocks (tests/unit/bootstrap.php) — no DB/WordPress needed.
      - name: Run PHPUnit
        run: cd arcadia-agents && ./vendor/bin/phpunit
